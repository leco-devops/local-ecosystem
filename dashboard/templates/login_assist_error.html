<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Auto-login failed — {{ assist.label }}</title>
    {% include "_head_icons.html" %}
    <link rel="stylesheet" href="/static/dashboard.css?v=20260521contrast" />
    <style>
      .assist-wrap {
        max-width: 480px;
        margin: 4rem auto;
        padding: 1.5rem;
        text-align: center;
      }
      .assist-wrap h1 {
        font-size: 1.1rem;
        margin-bottom: 0.75rem;
        color: #f87171;
      }
      .assist-error-detail {
        font-size: 13px;
        color: #e2e8f0;
        text-align: left;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(248, 113, 113, 0.35);
        border-radius: 8px;
        padding: 10px 12px;
        margin: 12px 0;
        word-break: break-word;
        white-space: pre-wrap;
      }
      .assist-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="assist-wrap">
      <h1>Auto-login failed — {{ assist.label }}</h1>
      <p class="muted small">{{ assist.summary }}</p>
      {% if assist.detail %}
      <div class="assist-error-detail">{{ assist.detail }}</div>
      {% endif %}
      <div class="assist-actions">
        <a class="ollama-act ollama-act--safe" href="{{ assist.login_url }}">Open login manually</a>
        {% if assist.control_url %}
        <a class="ollama-act ollama-act--safe" href="{{ assist.control_url }}">Start service (Control)</a>
        {% endif %}
        <a class="ollama-act ollama-act--safe" href="/hub#hub-ui-access">Back to UI access</a>
      </div>
    </div>
  </body>
</html>
