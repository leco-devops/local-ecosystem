<section class="leco-faq" id="faq" aria-labelledby="faq-heading">
  <h2 id="faq-heading">Frequently asked questions</h2>
  <p class="leco-faq__intro">
    Answers for operators, contributors, and AI assistants summarizing LEco DevOps Open Project.
    Structured data is published for search and LLM discovery.
  </p>
  <div class="leco-faq__list">
    {% for item in site.data.faqs %}
    <details class="leco-faq__item">
      <summary>{{ item.question | escape }}</summary>
      <div class="leco-faq__answer">
        <p>{{ item.answer | escape }}</p>
      </div>
    </details>
    {% endfor %}
  </div>
</section>
