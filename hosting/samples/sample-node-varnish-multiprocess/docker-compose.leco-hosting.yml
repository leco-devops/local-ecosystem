# LEco hosting overlay — attaches services to the ecosystem edge network.
# Mounts leco-docker-preload.js to /opt/leco/ (NOT /app — that's the source bind mount).
#
# Varnish apps: set LECO_VARNISH_HOST + LECO_DISABLE_VARNISH_NCSA so the Node process
# does not spawn host-side `sudo varnishncsa` (not available inside the server container).
# Startup skips apt-get/npm when already present to shorten restarts.

services:
  server:
    networks:
      - lh-network
    volumes:
      - ./leco-docker-preload.js:/opt/leco/leco-docker-preload.js:ro
    environment:
      NODE_ENV: development
      LECO_MONGO_URI: mongodb://mongo:27017/
      LECO_REDIS_URI: redis://redis:6379
      LECO_REDIS_HOST: redis
      LECO_REDIS_PORT: "6379"
      LECO_VARNISH_HOST: varnish
      LECO_OWN_DOMAINS: my-app.lh
      LECO_DISABLE_VARNISH_NCSA: "true"
      # Uncomment if your app needs Puppeteer/Chromium:
      # LECO_CHROME_USER_DATA_DIR: /mnt/tmpfs-user-data
      # PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      # PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
    # Simple startup (no system deps):
    command: ["bash", "-c", "if [ ! -d /app/node_modules/express ]; then npm install --prefer-offline 2>&1 | tail -5; else echo 'node_modules present — skipping npm install'; fi && echo 'starting server.js' && node -r /opt/leco/leco-docker-preload.js server.js"]
    # Chromium / Puppeteer — use this command instead of the simple one above:
    # command: ["bash", "-c", "if ! command -v chromium >/dev/null 2>&1; then echo 'Installing Chromium + deps' && apt-get update -qq && apt-get install -y -qq --no-install-recommends chromium fonts-liberation libnss3 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libgbm1 libasound2 libpangocairo-1.0-0 libgtk-3-0 libxshmfence1 ffmpeg webp && rm -rf /var/lib/apt/lists/*; else echo 'Chromium already installed — skipping apt-get'; fi && mkdir -p /mnt/tmpfs-user-data && if [ ! -d /app/node_modules/express ]; then npm install --prefer-offline 2>&1 | tail -5; else echo 'node_modules present — skipping npm install'; fi && echo 'starting server.js' && node -r /opt/leco/leco-docker-preload.js server.js"]

  worker:
    networks:
      - lh-network
    volumes:
      - ./leco-docker-preload.js:/opt/leco/leco-docker-preload.js:ro
    environment:
      NODE_ENV: development
      LECO_MONGO_URI: mongodb://mongo:27017/
      LECO_REDIS_URI: redis://redis:6379
      LECO_REDIS_HOST: redis
      LECO_REDIS_PORT: "6379"
    command: ["bash", "-c", "while [ ! -d /app/node_modules/express ]; do sleep 2; done && echo 'node_modules ready — starting worker.js' && node -r /opt/leco/leco-docker-preload.js worker.js"]

  cron:
    networks:
      - lh-network
    volumes:
      - ./leco-docker-preload.js:/opt/leco/leco-docker-preload.js:ro
    environment:
      NODE_ENV: development
      LECO_MONGO_URI: mongodb://mongo:27017/
      LECO_REDIS_URI: redis://redis:6379
      LECO_REDIS_HOST: redis
      LECO_REDIS_PORT: "6379"
    command: ["bash", "-c", "while [ ! -d /app/node_modules/express ]; do sleep 2; done && echo 'node_modules ready — starting cron.js' && node -r /opt/leco/leco-docker-preload.js cron.js"]

  varnish:
    networks:
      - lh-network

  mongo:
    networks:
      - lh-network

  redis:
    networks:
      - lh-network

networks:
  lh-network:
    external: true
