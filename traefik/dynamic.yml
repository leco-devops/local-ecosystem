      - web
    telegram-https:
      rule: Host(`telegram.lh`)
      service: telegram-gateway-service
      entryPoints:
      - websecure
      tls: true
    adminer-http:
      rule: Host(`adminer.lh`)
      service: adminer-service
      entryPoints:
      - web
    adminer-https:
      rule: Host(`adminer.lh`)
      service: adminer-service
      entryPoints:
      - websecure
      tls: true
    adminer-assist-http:
      rule: Host(`adminer.lh`) && PathPrefix(`/assist`)
      service: dashboard-service
      entryPoints:
      - web
      priority: 100
    adminer-assist-https:
      rule: Host(`adminer.lh`) && PathPrefix(`/assist`)
      service: dashboard-service
      entryPoints:
