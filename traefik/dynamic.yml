      tls: true
  services:
    ai-service:
      loadBalancer:
        servers:
        - url: http://open-webui:8080
    n8n-service:
      loadBalancer:
        servers:
        - url: http://n8n:5678
    ollama-service:
      loadBalancer:
        servers:
        - url: http://ollama:11434
    airllm-service:
      loadBalancer:
        servers:
        - url: http://airllm:11435
    dashboard-service:
      loadBalancer:
        servers:
        - url: http://service-dashboard:8090
    r2-service:
      loadBalancer:
        servers:
        - url: http://r2-adapter:8081
    kv-service:
      loadBalancer:
        servers:
        - url: http://kv-adapter:8082
    d1-service:
      loadBalancer:
        servers:
        - url: http://d1-adapter:8083
    autoscale-service:
      loadBalancer:
        servers:
        - url: http://autoscaler:8084
    minio-console-service:
      loadBalancer:
        servers:
        - url: http://minio:9001
    minio-api-service:
      loadBalancer:
        servers:
        - url: http://minio:9000
    workers-service:
      loadBalancer:
        serversTransport: local-relaxed-timeout
        servers:
        - url: http://workers-runtime:8787
    browser-rendering-service:
      loadBalancer:
        serversTransport: local-relaxed-timeout
        servers:
        - url: http://browser-rendering-local:8085
    cache-varnish-service:
      loadBalancer:
        servers:
        - url: http://cache-varnish:80
    mailpit-service:
      loadBalancer:
        servers:
        - url: http://mailpit:8025
    telegram-gateway-service:
      loadBalancer:
        servers:
        - url: http://telegram-gateway:8091
    adminer-service:
      loadBalancer:
        servers:
        - url: http://adminer:8080
    redis-commander-service:
      loadBalancer:
        servers:
        - url: http://redis-commander:8081
tls:
  certificates:
  - certFile: /certs/wildcard.lh.pem
    keyFile: /certs/wildcard.lh-key.pem
