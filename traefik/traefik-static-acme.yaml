# Traefik static config with Let's Encrypt (ACME HTTP-01).
# Mounted when config/leco-platform.yaml tls.mode is acme.

global:
  checkNewVersion: false

api:
  insecure: true

providers:
  file:
    directory: /etc/traefik-dynamic
    watch: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

certificatesResolvers:
  lecoacme:
    acme:
      email: "ops@example.com"
      storage: /acme/acme.json
      httpChallenge:
        entryPoint: web
