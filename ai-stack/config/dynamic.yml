http:
  serversTransports:
    local-relaxed-timeout:
      forwardingTimeouts:
        dialTimeout: 45s
        responseHeaderTimeout: 90s

  routers:

    traefik-http:
      rule: "Host(`traefik.lh`)"
      service: api@internal
      entryPoints:
        - web

    traefik-https:
      rule: "Host(`traefik.lh`)"
      service: api@internal
      entryPoints:
        - websecure
      tls: true

    ai-http:
      rule: "Host(`ai.lh`)"
      service: ai-service
      entryPoints:
        - web

    ai-https:
      rule: "Host(`ai.lh`)"
      service: ai-service
      entryPoints:
        - websecure
      tls: true

    n8n-http:
      rule: "Host(`n8n.lh`)"
      service: n8n-service
      entryPoints:
        - web

    n8n-https:
      rule: "Host(`n8n.lh`)"
      service: n8n-service
      entryPoints:
        - websecure
      tls: true

    ollama-http:
      rule: "Host(`ollama.lh`)"
      service: ollama-service
      entryPoints:
        - web

    ollama-https:
      rule: "Host(`ollama.lh`)"
      service: ollama-service
      entryPoints:
        - websecure
      tls: true

    dashboard-http:
      rule: "Host(`localhost.lh`)"
      service: dashboard-service
      entryPoints:
        - web

    r2-http:
      rule: "Host(`r2.lh`)"
      service: r2-service
      entryPoints:
        - web

    kv-http:
      rule: "Host(`kv.lh`)"
      service: kv-service
      entryPoints:
        - web

    d1-http:
      rule: "Host(`d1.lh`)"
      service: d1-service
      entryPoints:
        - web

    autoscale-http:
      rule: "Host(`autoscale.lh`)"
      service: autoscale-service
      entryPoints:
        - web

    minio-console-http:
      rule: "Host(`minio-console.lh`)"
      service: minio-console-service
      entryPoints:
        - web

    workers-http:
      rule: "Host(`workers.lh`)"
      service: workers-service
      entryPoints:
        - web

  services:

    ai-service:
      loadBalancer:
        servers:
          - url: "http://open-webui:8080"

    n8n-service:
      loadBalancer:
        servers:
          - url: "http://n8n:5678"

    ollama-service:
      loadBalancer:
        servers:
          - url: "http://ollama:11434"

    dashboard-service:
      loadBalancer:
        servers:
          - url: "http://service-dashboard:8090"

    r2-service:
      loadBalancer:
        servers:
          - url: "http://r2-adapter:8081"

    kv-service:
      loadBalancer:
        servers:
          - url: "http://kv-adapter:8082"

    d1-service:
      loadBalancer:
        servers:
          - url: "http://d1-adapter:8083"

    autoscale-service:
      loadBalancer:
        servers:
          - url: "http://autoscaler:8084"

    minio-console-service:
      loadBalancer:
        servers:
          - url: "http://minio:9001"

    workers-service:
      loadBalancer:
        serversTransport: local-relaxed-timeout
        servers:
          - url: "http://workers-runtime:8787"

# Container paths: traefik mounts repo certs at /certs
tls:
  certificates:
    - certFile: "/certs/wildcard.lh.pem"
      keyFile: "/certs/wildcard.lh-key.pem"
