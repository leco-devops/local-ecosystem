http:
  routers:

    traefik-http:
      rule: "Host(`traefik.lh`)"
      service: api@internal
      entryPoints:
        - web

    traefik-https:
      rule: "Host(`traefik.lh`)"
      service: api@internal
      entryPoints:
        - websecure
      tls: true

    ai-http:
      rule: "Host(`ai.lh`)"
      service: ai-service
      entryPoints:
        - web

    ai-https:
      rule: "Host(`ai.lh`)"
      service: ai-service
      entryPoints:
        - websecure
      tls: true

    n8n-http:
      rule: "Host(`n8n.lh`)"
      service: n8n-service
      entryPoints:
        - web

    n8n-https:
      rule: "Host(`n8n.lh`)"
      service: n8n-service
      entryPoints:
        - websecure
      tls: true

    ollama-http:
      rule: "Host(`ollama.lh`)"
      service: ollama-service
      entryPoints:
        - web

    ollama-https:
      rule: "Host(`ollama.lh`)"
      service: ollama-service
      entryPoints:
        - websecure
      tls: true

    dashboard-http:
      rule: "Host(`localhost.lh`)"
      service: dashboard-service
      entryPoints:
        - web

  services:

    ai-service:
      loadBalancer:
        servers:
          - url: "http://open-webui:8080"

    n8n-service:
      loadBalancer:
        servers:
          - url: "http://n8n:5678"

    ollama-service:
      loadBalancer:
        servers:
          - url: "http://ollama:11434"

    dashboard-service:
      loadBalancer:
        servers:
          - url: "http://service-dashboard:8090"

tls:
  certificates:
    - certFile: "/certs/wildcard.lh.pem"
      keyFile: "/certs/wildcard.lh-key.pem"
