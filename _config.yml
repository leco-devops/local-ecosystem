# GitHub Pages (Jekyll) — https://docs.github.com/en/pages/setting-up-a-github-pages-site-with-jekyll
title: LEco DevOps Open Project
description: >-
  One-click deploy for almost any application. LEco reads your config, converts
  manifests, orchestrates Docker & Traefik, and ships on *.lh — local cloud edge on Docker.
theme: jekyll-theme-cayman
show_downloads: true
lang: en

url: "https://leco-project.us"
baseurl: ""

image: /assets/img/leco-og.svg

keywords: >-
  LEco DevOps, local cloud, Docker, Traefik, dev stack, one-click deploy, open source,
  Platform tab, leco-devops, *.lh, Ollama, Cloudflare-local, WordPress, Magento, cloud VM

author:
  name: LEco DevOps Open Project
  email: leco@techtonic.systems

twitter:
  card: summary_large_image

# Google Analytics / Tag Manager — set when ready (leave empty to disable)
google_analytics: ""
google_tag_manager: ""
google_site_verification: ""

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

github:
  repository_name: leco-devops/local-ecosystem
  is_project_page: true

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-relative-links
  # Sitemap: explicit sitemap.xml + _data/sitemap.yml (includes LLM .txt URLs)

# Do not publish the full monorepo as HTML pages — landing only
exclude:
  - AGENTS.md
  - CHANGELOG.md
  - CONTRIBUTING.md
  - LICENSE
  - NOTICE.md
  - SECURITY.md
  - README.md
  - Backup
  - cloudflare-local
  - config
  - dashboard
  - docs
  - ecosystem-stack
  - hosting
  - infra
  - platform
  - scripts
  - tools
  - traefik
  - "*.sh"
  - leco-cli.sh
  - vendor
