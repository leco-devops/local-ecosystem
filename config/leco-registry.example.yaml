# Copy to leco-registry.yaml in this directory and edit.
# LEco DevOps loads config/leco-registry.yaml (gitignored by default).
#
# Register from an app repo (LEco DevOps):
#   leco-devops ecosystem-register --ecosystem-root /path/to/local-ecosystem
# Or set LECO_ECOSYSTEM_ROOT and run from the app directory.
#
# manifest: path relative to local-ecosystem repo root (sibling app: ../MyApp/leco.app.yaml).
# The LEco DevOps container mounts the repo at /project and its *parent* at /workspace-parent
# so ../MyApp/... resolves for Control actions.
apps: []
#  - id: leco
#    label: CrawlerVision
#    manifest: ../CrawlerVision/cloudflare/leco.app.yaml
#
# Cloudflare binding mapping: docs/CF_LECO_SERVICE_MAP.md
