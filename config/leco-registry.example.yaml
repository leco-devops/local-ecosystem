# Copy to leco-registry.yaml in this directory and edit.
# Ops Dashboard Control tab loads config/leco-registry.yaml (gitignored by default).
#
# Register from an app repo:
#   leco-app ecosystem-register --ecosystem-root /path/to/local-ecosystem
# Or set LECO_ECOSYSTEM_ROOT and run from the app directory.
#
# manifest: path relative to local-ecosystem repo root (sibling app: ../MyApp/leco.app.yaml).
# The dashboard container mounts the repo at /project and its *parent* at /workspace-parent
# so ../MyApp/... resolves for Control actions.
apps: []
